apiVersion: v1
kind: Secret
metadata:
  name: hllc-store-secret
type: Opaque
stringData:
  # Do not apply this file as-is in production.
  # The workflow creates the live Secret from GitHub Secrets.
  MONGODB_URI: mongodb://example-host:27017/hllc_store
  ADMIN_PASSWORD_HASH: scrypt:example-salt:example-hash
  ADMIN_SESSION_SECRET: change-this-admin-session-secret
