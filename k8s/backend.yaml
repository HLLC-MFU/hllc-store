apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: sdad-hllc
      containers:
        - name: backend
          image: hllc-store-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: hllc-store-config
                  key: FRONTEND_URL
            - name: ADMIN_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: hllc-store-config
                  key: ADMIN_USERNAME
            - name: MONGODB_DB
              valueFrom:
                configMapKeyRef:
                  name: hllc-store-config
                  key: MONGODB_DB
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: hllc-store-secret
                  key: MONGODB_URI
            - name: NEXT_PUBLIC_SITE_URL
              valueFrom:
                configMapKeyRef:
                  name: hllc-store-config
                  key: NEXT_PUBLIC_SITE_URL
            - name: SITE_URL
              valueFrom:
                configMapKeyRef:
                  name: hllc-store-config
                  key: SITE_URL
            - name: TRUSTED_PROXY_HOPS
              valueFrom:
                configMapKeyRef:
                  name: hllc-store-config
                  key: TRUSTED_PROXY_HOPS
            - name: ADMIN_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: hllc-store-secret
                  key: ADMIN_SESSION_SECRET
            - name: ADMIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: hllc-store-secret
                  key: ADMIN_PASSWORD_HASH
            - name: GMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: hllc-store-secret
                  key: GMAIL_USER
                  optional: true
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hllc-store-secret
                  key: GMAIL_APP_PASSWORD
                  optional: true
            - name: GMAIL_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: hllc-store-secret
                  key: GMAIL_OAUTH_CLIENT_ID
                  optional: true
            - name: GMAIL_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hllc-store-secret
                  key: GMAIL_OAUTH_CLIENT_SECRET
                  optional: true
            - name: GMAIL_OAUTH_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hllc-store-secret
                  key: GMAIL_OAUTH_REFRESH_TOKEN
                  optional: true
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /api/backend
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/backend
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: backend-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-uploads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
