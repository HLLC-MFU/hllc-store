name: Deploy HLLC Store

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  K8S_NAMESPACE: hllc-store

jobs:

  build:
    runs-on: hllc-org-runner
    # Using Kaniko's debug image allows running standard shell script steps
    container:
      image: gcr.io/kaniko-project/executor:v1.23.0-debug
      options: --entrypoint /busybox/sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        shell: sh
        run: |
          mkdir -p /kaniko/.docker
          echo "{\"auths\":{\"${{ env.REGISTRY }}\":{\"auth\":\"$(printf "%s:%s" "${{ github.actor }}" "${{ secrets.GITHUB_TOKEN }}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json

      - name: Compute image tags
        id: tags
        shell: sh
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "frontend=ghcr.io/${owner_lower}/hllc-store-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend=ghcr.io/${owner_lower}/hllc-store-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        run: |
          /kaniko/executor \
            --context=dir://. \
            --dockerfile=apps/frontend/Dockerfile \
            --destination=${{ steps.tags.outputs.frontend }}

      - name: Build and push backend image
        run: |
          /kaniko/executor \
            --context=dir://. \
            --dockerfile=apps/backend/Dockerfile \
            --destination=${{ steps.tags.outputs.backend }}

  deploy:
    runs-on: hllc-org-runner
    container: ubuntu:24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "frontend=ghcr.io/${owner_lower}/hllc-store-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend=ghcr.io/${owner_lower}/hllc-store-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          if [[ -z "${KUBECONFIG_B64:-}" ]]; then
            echo "::error::Missing GitHub Secret KUBECONFIG_B64"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create runtime secret
        shell: bash
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_OAUTH_CLIENT_ID: ${{ secrets.GMAIL_OAUTH_CLIENT_ID }}
          GMAIL_OAUTH_CLIENT_SECRET: ${{ secrets.GMAIL_OAUTH_CLIENT_SECRET }}
          GMAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.GMAIL_OAUTH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          for required in ADMIN_USERNAME MONGODB_DB MONGODB_URI ADMIN_SESSION_SECRET ADMIN_PASSWORD_HASH; do
            if [[ -z "${!required:-}" ]]; then
              echo "::error::Missing GitHub Secret ${required}"
              exit 1
            fi
          done

          kubectl -n "${K8S_NAMESPACE}" delete secret hllc-store-secret --ignore-not-found

          secret_args=(
            --from-literal=MONGODB_URI="$MONGODB_URI"
            --from-literal=ADMIN_SESSION_SECRET="$ADMIN_SESSION_SECRET"
            --from-literal=ADMIN_PASSWORD_HASH="$ADMIN_PASSWORD_HASH"
          )

          [[ -n "${SMTP_HOST:-}" ]] && secret_args+=(--from-literal=SMTP_HOST="$SMTP_HOST")
          [[ -n "${SMTP_PORT:-}" ]] && secret_args+=(--from-literal=SMTP_PORT="$SMTP_PORT")
          [[ -n "${SMTP_SECURE:-}" ]] && secret_args+=(--from-literal=SMTP_SECURE="$SMTP_SECURE")
          [[ -n "${SMTP_USER:-}" ]] && secret_args+=(--from-literal=SMTP_USER="$SMTP_USER")
          [[ -n "${SMTP_PASSWORD:-}" ]] && secret_args+=(--from-literal=SMTP_PASSWORD="$SMTP_PASSWORD")
          [[ -n "${SMTP_FROM:-}" ]] && secret_args+=(--from-literal=SMTP_FROM="$SMTP_FROM")
          [[ -n "${GMAIL_USER:-}" ]] && secret_args+=(--from-literal=GMAIL_USER="$GMAIL_USER")
          [[ -n "${GMAIL_APP_PASSWORD:-}" ]] && secret_args+=(--from-literal=GMAIL_APP_PASSWORD="$GMAIL_APP_PASSWORD")
          [[ -n "${GMAIL_OAUTH_CLIENT_ID:-}" ]] && secret_args+=(--from-literal=GMAIL_OAUTH_CLIENT_ID="$GMAIL_OAUTH_CLIENT_ID")
          [[ -n "${GMAIL_OAUTH_CLIENT_SECRET:-}" ]] && secret_args+=(--from-literal=GMAIL_OAUTH_CLIENT_SECRET="$GMAIL_OAUTH_CLIENT_SECRET")
          [[ -n "${GMAIL_OAUTH_REFRESH_TOKEN:-}" ]] && secret_args+=(--from-literal=GMAIL_OAUTH_REFRESH_TOKEN="$GMAIL_OAUTH_REFRESH_TOKEN")

          kubectl -n "${K8S_NAMESPACE}" create secret generic hllc-store-secret \
            "${secret_args[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render config map values
        shell: bash
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          set -euo pipefail

          for required in ADMIN_USERNAME MONGODB_DB SITE_URL; do
            if [[ -z "${!required:-}" ]]; then
              echo "::error::Missing GitHub Secret ${required}"
              exit 1
            fi
          done

          sed -i "s#__ADMIN_USERNAME__#${ADMIN_USERNAME}#g" k8s/configmap.yaml
          sed -i "s#__MONGODB_DB__#${MONGODB_DB}#g" k8s/configmap.yaml
          sed -i "s#__SITE_URL__#${SITE_URL}#g" k8s/configmap.yaml

      - name: Point manifests at the pushed images
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s#image: hllc-store-frontend:latest#image: ${{ steps.tags.outputs.frontend }}#g" k8s/frontend.yaml
          sed -i "s#image: hllc-store-backend:latest#image: ${{ steps.tags.outputs.backend }}#g" k8s/backend.yaml

      - name: Apply manifests
        run: kubectl apply -k k8s
